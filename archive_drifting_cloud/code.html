<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Lowkal.fm - Archive</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400&amp;family=Syne:wght@700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ccf20d",
                        "background-light": "#f8f8f5",
                        "background-dark": "#1f2210",
                    },
                    fontFamily: {
                        "display": ["Syne", "sans-serif"],
                        "ui": ["Outfit", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "0.75rem", "xl": "1.5rem", "full": "9999px"},
                    boxShadow: {
                        'float': '0 16px 48px rgba(0,0,0,0.8)',
                    }
                },
            },
        }
    </script>
<style>
        body {
            cursor: crosshair; /* Fallback for custom cursor */
        }
        
        /* Drifting Animations */
        @keyframes drift1 {
            0% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(5vw, -5vh) rotate(2deg); }
            66% { transform: translate(-2vw, 8vh) rotate(-1deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
        @keyframes drift2 {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-8vw, 6vh) rotate(-3deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
        @keyframes drift3 {
            0% { transform: translate(0, 0) rotate(0deg); }
            40% { transform: translate(6vw, 10vh) rotate(1deg); }
            80% { transform: translate(-4vw, -8vh) rotate(-2deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        .animate-drift-slow { animation: drift1 45s ease-in-out infinite; }
        .animate-drift-med { animation: drift2 35s ease-in-out infinite; }
        .animate-drift-fast { animation: drift3 25s ease-in-out infinite; }

        /* Pause on hover */
        .node-container:hover {
            animation-play-state: paused !important;
            z-index: 50;
        }

        /* Ambient glowing background */
        .ambient-glow {
            background: radial-gradient(circle at 50% 50%, rgba(204, 242, 13, 0.05) 0%, rgba(31, 34, 16, 0) 60%);
        }
    </style>
</head>
<body class="bg-background-dark font-ui text-white w-full h-screen overflow-hidden relative selection:bg-primary selection:text-background-dark">
<!-- Ambient Background Glow -->
<div class="absolute inset-0 ambient-glow pointer-events-none"></div>
<!-- Back Pill -->
<button class="absolute top-8 left-8 z-40 flex items-center gap-3 px-6 py-3 rounded-full bg-[#14142B]/40 backdrop-blur-[24px] border border-white/5 hover:bg-[#14142B]/60 transition-all duration-300 group shadow-float">
<span class="material-symbols-outlined text-primary group-hover:-translate-x-1 transition-transform" style="font-variation-settings: 'FILL' 1;">arrow_back</span>
<span class="font-display font-bold text-sm tracking-widest uppercase">Back to Live</span>
</button>
<!-- Drifting Archive Cloud -->
<div class="absolute inset-0 w-full h-full perspective-[1000px]">
<!-- Foreground Node (Large, Fast) -->
<div class="node-container animate-drift-fast absolute top-[20%] left-[15%] group cursor-pointer transition-transform duration-500 hover:scale-105 z-30" style="width: 350px; height: 350px;">
<div class="w-full h-full rounded-lg overflow-hidden shadow-float relative">

<div class="absolute inset-0 bg-background-dark/40 group-hover:bg-background-dark/10 transition-colors duration-300"></div>
<!-- Play Overlay -->
<div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300">
<div class="w-20 h-20 rounded-full bg-primary flex items-center justify-center shadow-[0_0_30px_rgba(204,242,13,0.5)]">
<span class="material-symbols-outlined text-background-dark text-4xl ml-2" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</div>
</div>
</div>
</div>
<!-- Midground Node 1 (Medium, Medium Speed) -->
<div class="node-container animate-drift-med absolute top-[50%] left-[60%] group cursor-pointer transition-transform duration-500 hover:scale-105 z-20" style="width: 250px; height: 250px;">
<div class="w-full h-full rounded-lg overflow-hidden shadow-float relative">
<img class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110 opacity-70 group-hover:opacity-100" data-alt="An abstract, surreal landscape composed of morphing liquid metal textures in a pitch-black void. Vibrant streaks of electric lime and hot pink reflect off the fluid surfaces, creating a stark, high-contrast visual. The composition is asymmetrical and dynamic, evoking a sense of continuous motion and kinetic energy. This visual represents a modern, experimental electronic music aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuA6ZPUrl4NUSxcjmLS0hUDqZQutT8AJhxxG93Bv6TacFHgGtzZZYw4lw_SXQYnAdWHP-YSst4tMxT3V17DxN1bD3b8PCgSEVQ9Wl0_MYeLJTMYEDdcZZ2UF21LaWlo8LjwWk_1c3RYmYaUdjL3HUV9ZEaVpPwfSixwHOOg0Zdz6js9Hw7P3Ol6S72BL8Jd7o935P3y14b1e7PO2Ruq5kromlAsKNKKHMkNYcxdnSNnDsGox3NgX9i6uiAzIHY3GWIkwMB-Nc-vlwETJ"/>
<div class="absolute inset-0 bg-background-dark/50 group-hover:bg-background-dark/10 transition-colors duration-300"></div>
<!-- Play Overlay -->
<div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300">
<div class="w-16 h-16 rounded-full bg-primary flex items-center justify-center shadow-[0_0_20px_rgba(204,242,13,0.4)]">
<span class="material-symbols-outlined text-background-dark text-3xl ml-1" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</div>
</div>
</div>
</div>
<!-- Midground Node 2 (Medium, Medium Speed) -->
<div class="node-container animate-drift-med absolute top-[10%] right-[20%] group cursor-pointer transition-transform duration-500 hover:scale-105 z-20" style="width: 250px; height: 250px; animation-delay: -10s;">
<div class="w-full h-full rounded-lg overflow-hidden shadow-float relative">
<img class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110 opacity-70 group-hover:opacity-100" data-alt="A gritty, textured digital canvas showing distorted typography and glitch art artifacts. The background is a deep, murky violet with sudden, sharp interruptions of bright lime green noise. The aesthetic is heavily influenced by early internet art and modern underground club flyers. The overall feeling is raw, loud, and visually arresting, perfect for an abrasive bass music mix." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAexaABiZKhpNDZ2zxqd8cKeIAeiWlTQ8iExIT1LE-f75kECnimQkJka35W0mdY_rn7bb1qeT1IqpJCwwSweQJWkVf3CJIEOYaLXNYs2dOr4O-rRR48rhcd3kTA9LN1_gzf7V1d4KCrbnWbR7njdeuSg41A4nuCLP6L9lHJp2u6Zz7Cr0IsIfYgMxW_RhaZXJt_Lj-zPz_ZeEabCMa3wdIr_0Bt6UFulm3-Btppg1qIBF0Lh826bGjW2qjuifZ0lCNlYUTqYfAmPtV0"/>
<div class="absolute inset-0 bg-background-dark/50 group-hover:bg-background-dark/10 transition-colors duration-300"></div>
<div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300">
<div class="w-16 h-16 rounded-full bg-primary flex items-center justify-center shadow-[0_0_20px_rgba(204,242,13,0.4)]">
<span class="material-symbols-outlined text-background-dark text-3xl ml-1" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</div>
</div>
</div>
</div>
<!-- Background Node (Small, Slow) -->
<div class="node-container animate-drift-slow absolute bottom-[15%] left-[35%] group cursor-pointer transition-transform duration-500 hover:scale-105 z-10" style="width: 150px; height: 150px;">
<div class="w-full h-full rounded-lg overflow-hidden shadow-float relative">
<img class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110 opacity-40 group-hover:opacity-100 blur-[1px] group-hover:blur-none" data-alt="A minimalist 3D rendering of a solitary, floating monolith in an endless dark expanse. The object emits a soft, pulsing electric lime aura that barely illuminates the surrounding deep ink blue space. The lighting is low-key and moody, focusing entirely on the stark contrast between the glowing object and the void. The mood is hypnotic and deep, suited for an ambient or dub techno session." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBGzuejsDiuXFtiYoSfYlzyh1TYM54yXdGojk_UMQsdyC9nb2zFSt5L9YmKk1aKslrSe0DeiixMX3XmahR3WoFaRHz8A3mcN1T3meGn_CVXmU0anANXO9f7Z19WgTcCzuKOB5wNmoPqXSsv7_aBcrntj5n3TUyAEeOE9FajSRu6955vRpsPqYYzIpFIeqIZoiQQEyWNVt0NRl__s4rSKtyUg1cXjDRclWak--6On_vzPaeRTKhdjiw_-vyoHeFoG2s1tkjx1dU1g8es"/>
<div class="absolute inset-0 bg-background-dark/60 group-hover:bg-background-dark/10 transition-colors duration-300"></div>
<div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300">
<div class="w-12 h-12 rounded-full bg-primary flex items-center justify-center shadow-[0_0_15px_rgba(204,242,13,0.3)]">
<span class="material-symbols-outlined text-background-dark text-2xl ml-1" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</div>
</div>
</div>
</div>
</div>
</body></html>
