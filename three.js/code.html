<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_19 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_19" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_19');
  const devicePixelRatio = window.devicePixelRatio || 1;
  const container = document.getElementById('shader-canvas') || document.body;
const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(width, height);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

// Organic morphing geometry
const geometry = new THREE.IcosahedronGeometry(2, 64);
const material = new THREE.MeshPhongMaterial({
  color: 0x222233,
  emissive: 0x111122,
  specular: 0xd5ff00,
  shininess: 100,
  wireframe: true,
  transparent: true,
  opacity: 0.3
});

const mesh = new THREE.Mesh(geometry, material);
scene.add(mesh);

const light = new THREE.PointLight(0xd5ff00, 1, 100);
light.position.set(5, 5, 5);
scene.add(light);

const ambientLight = new THREE.AmbientLight(0x404040);
scene.add(ambientLight);

// Animation logic
let time = 0;
function animate() {
  requestAnimationFrame(animate);
  time += 0.01;

  // Subtle pulsing/morphing to simulate a visualizer
  mesh.rotation.x += 0.002;
  mesh.rotation.y += 0.003;
  
  const pulse = Math.sin(time) * 0.1 + 1;
  mesh.scale.set(pulse, pulse, pulse);
  
  // Deform vertices slightly
  const position = geometry.attributes.position;
  for (let i = 0; i < position.count; i++) {
    const x = position.getX(i);
    const y = position.getY(i);
    const z = position.getZ(i);
    
    const noise = Math.sin(x * 2 + time) * 0.1 + Math.cos(y * 2 + time) * 0.1;
    position.setZ(i, z + noise * 0.02);
  }
  position.needsUpdate = true;

  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  const w = container.clientWidth || window.innerWidth;
  const h = container.clientHeight || window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});

animate();
})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_19 -->
</body>
</html>
