<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&amp;family=JetBrains+Mono:wght@500;700&amp;family=Syne:wght@700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#D0FF00",
          "background-light": "#f8f8f5",
          "background-dark": "#050505",
          "surface": "#121214",
          "mesh": "#1C1C1F",
          "text": "#E6E6E6",
          "muted": "#5C5C61",
        },
        fontFamily: {
          "display": ["Syne", "sans-serif"],
          "mono": ["JetBrains Mono", "monospace"],
          "body": ["Inter", "sans-serif"],
        },
        borderRadius: {"DEFAULT": "0px", "lg": "0px", "xl": "0px", "full": "0px"},
      },
    },
  }
</script>
<style>
  body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    opacity: 0.15;
    mix-blend-mode: overlay;
    z-index: 50;
  }
  
  /* Spatial Grid Layout */
  .spatial-canvas {
    width: 300vw;
    height: 300vh;
    position: relative;
    background-color: #050505;
  }

  .mix-node {
    width: 320px;
    height: 320px;
    position: absolute;
    border: 1px solid var(--color-mesh, #1C1C1F);
    overflow: hidden;
    cursor: pointer;
  }

  .mix-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: grayscale(100%);
  }

  .mix-node:hover .mix-image {
    filter: grayscale(100%) invert(100%);
  }

  .mix-meta {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    background: #121214;
    padding: 16px;
    border-top: 1px solid #1C1C1F;
    display: none;
  }

  .mix-node:hover .mix-meta {
    display: block;
  }

  /* Custom Scrollbar for brutalist feel */
  ::-webkit-scrollbar {
    width: 8px;
    height: 8px;
  }
  ::-webkit-scrollbar-track {
    background: #050505;
    border-left: 1px solid #1C1C1F;
    border-top: 1px solid #1C1C1F;
  }
  ::-webkit-scrollbar-thumb {
    background: #5C5C61;
    border-radius: 0;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: #D0FF00;
  }
  
  /* Utility for text inversion on hover if needed */
  .hover-invert-text:hover {
    color: #050505;
    background-color: #D0FF00;
  }
</style>
</head>

      [X] LIVE

</div>

<script>
